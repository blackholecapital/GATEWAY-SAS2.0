      font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      font-size="86" letter-spacing="0.08em"
      fill="#d246ff">TIER 3</text>
  </g>

  <g filter="url(#neon)" opacity="0.70">
    <path d="M1350 160
             C1460 300 1525 400 1525 520
             C1525 670 1425 790 1290 790
             C1155 790 1055 670 1055 520
             C1055 400 1120 300 1230 160
             C1270 110 1310 80 1350 160Z"
          fill="none" stroke="#d246ff" stroke-opacity="0.55" stroke-width="5"/>
    <circle cx="1290" cy="520" r="120" fill="none" stroke="#ffb000" stroke-opacity="0.16" stroke-width="4"/>
  </g>

  <rect width="1600" height="900" fill="black" opacity="0.20"/>
